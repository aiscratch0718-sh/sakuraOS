# Workflow Catalog
# Used by /help to determine where a user is and what comes next.
#
# Artifact checks:
#   glob: file glob pattern — complete if ≥1 file matches (or min_count)
#   pattern: text pattern that must appear in the file (checked after glob)
#   min_count: minimum matching files required (default: 1)
#   note: human-readable fallback when completion can't be auto-detected
#
# required: true → blocks progression to next phase (shown as REQUIRED)
# required: false → optional enhancement (shown as OPTIONAL)
# repeatable: true → runs multiple times (one per system, story, etc.)
#
# Phase gates (/gate-check): verdicts are ADVISORY — they guide the decision
# but never hard-block advancement. The user always decides whether to proceed.

phases:

  concept:
    label: "Concept"
    description: "Develop your product idea into a documented concept"
    next_phase: systems-design
    steps:
      - id: brainstorm
        name: "Brainstorm"
        command: /brainstorm
        required: false
        description: "Explore the product concept using MDA, verb-first, and user psychology frameworks"

      - id: framework-setup
        name: "Framework Setup"
        command: /setup-stack
        required: true
        artifact:
          glob: ".claude/docs/technical-preferences.md"
          pattern: "Framework: [^[]"
        description: "Configure framework, pin version, set naming conventions and performance budgets"

      - id: product-concept
        name: "Product Concept Document"
        command: /brainstorm
        required: true
        artifact:
          glob: "design/prd/product-concept.md"
        description: "Formalize concept with pillars, MDA analysis, and scope tiers"

      - id: design-review-concept
        name: "Concept Review"
        command: /design-review
        required: false
        description: "Validate the product concept (recommended before proceeding)"

      - id: design-system-bible
        name: "Design System Bible"
        command: /design-system-bible
        required: true
        artifact:
          glob: "design/art/design-system-bible.md"
        description: "Author the visual identity specification (9 sections). Uses the Visual Identity Anchor produced by /brainstorm. Run after product concept is formed, before systems design."

      - id: map-systems
        name: "Systems Map"
        command: /map-systems
        required: true
        artifact:
          glob: "design/prd/systems-index.md"
        description: "Decompose concept into systems with dependency ordering and priority tiers"

  systems-design:
    label: "Systems Design"
    description: "Author a PRD for each system in the systems index"
    next_phase: technical-setup
    steps:
      - id: design-system
        name: "System PRDs"
        command: /design-system
        required: true
        repeatable: true
        artifact:
          note: "Check design/prd/systems-index.md — each MVP system needs Status: Approved"
        description: "Author per-system PRDs (guided, section-by-section). Run once per system."

      - id: design-review
        name: "Per-System Design Review"
        command: /design-review
        required: true
        repeatable: true
        description: "Validate each PRD (8 required sections, no MAJOR REVISION verdict). Run per system."

      - id: review-all-prds
        name: "Cross-PRD Review"
        command: /review-all-prds
        required: true
        artifact:
          glob: "design/prd/prd-cross-review-*.md"
        description: "Holistic consistency check + design theory review across all PRDs simultaneously"

      - id: consistency-check
        name: "Consistency Check"
        command: /consistency-check
        required: false
        repeatable: true
        description: "Scan all PRDs for contradictions, undefined references, and mechanic conflicts. Run after /review-all-prds, and again any time a PRD is added or revised mid-project."

  technical-setup:
    label: "Technical Setup"
    description: "Architecture decisions, visual identity specification, accessibility foundations, framework validation"
    next_phase: pre-production
    steps:
      - id: create-architecture
        name: "Architecture Document"
        command: /create-architecture
        required: true
        artifact:
          glob: "docs/architecture/architecture.md"
        description: "Author the master architecture document covering all systems"

      - id: architecture-decision
        name: "Architecture Decisions (ADRs)"
        command: /architecture-decision
        required: true
        repeatable: true
        artifact:
          glob: "docs/architecture/adr-*.md"
          min_count: 3
        description: "Document key technical decisions as ADRs. Minimum 3 Foundation-layer ADRs required."

      - id: architecture-review
        name: "Architecture Review"
        command: /architecture-review
        required: true
        artifact:
          glob: "docs/architecture/architecture-review-*.md"
        description: "Validate completeness, dependency ordering, framework compatibility"

      - id: control-manifest
        name: "Control Manifest"
        command: /create-permissions-manifest
        required: true
        artifact:
          glob: "docs/architecture/control-manifest.md"
        description: "Flat programmer rules sheet generated from all Accepted ADRs"

      - id: accessibility-doc
        name: "Accessibility Requirements"
        required: true
        artifact:
          glob: "design/accessibility-requirements.md"
        description: "Commit accessibility tier (Basic/Standard/Comprehensive/Exemplary) and feature matrix. UX specs (Phase 4) reference this tier."

  pre-production:
    label: "Pre-Production"
    description: "UX specs, asset specs, prototype the core mechanic, define stories, validate fun"
    next_phase: production
    steps:
      - id: asset-spec
        name: "Asset Specs"
        command: /asset-spec
        required: false
        repeatable: true
        artifact:
          glob: "design/assets/asset-manifest.md"
        description: "Generate per-asset visual specifications and AI generation prompts from approved PRDs and level docs. Run once per system/level/character."

      - id: ux-design
        name: "UX Specs (key screens)"
        command: /ux-design
        required: true
        repeatable: true
        artifact:
          glob: "design/ux/*.md"
          min_count: 1
        description: "Author UX specs for the primary dashboard, list / detail screens, and interaction patterns. Reads input method and surface targets from technical-preferences.md."

      - id: ux-review
        name: "UX Review"
        command: /ux-review
        required: true
        description: "Validate all key screen UX specs for PRD alignment and accessibility tier compliance. Run before creating epics."

      - id: prototype
        name: "Prototype"
        command: /prototype
        required: true
        artifact:
          glob: "prototypes/*/README.md"
          min_count: 1
        description: "Build throwaway prototypes in isolated worktree to validate core mechanic"

      - id: create-epics
        name: "Create Epics"
        command: /create-epics
        required: true
        repeatable: true
        artifact:
          glob: "production/epics/*/EPIC.md"
          min_count: 1
        description: "Translate PRDs + ADRs into epics — one per architectural module. Run per layer: /create-epics layer: foundation, then /create-epics layer: core"

      - id: create-stories
        name: "Create Stories"
        command: /create-stories
        required: true
        repeatable: true
        artifact:
          glob: "production/epics/**/*.md"
          min_count: 2
        description: "Break each epic into implementable story files. Run per epic: /create-stories [epic-slug]"

      - id: test-setup
        name: "Test Framework Setup"
        command: /test-setup
        required: false
        artifact:
          note: "Check tests/ directory for framework-specific test framework scaffold"
        description: "Scaffold the test framework and CI pipeline once before the first sprint. Leads to /test-helpers for fixture generation, /qa-plan per epic, and /smoke-check per sprint."

      - id: sprint-plan
        name: "First Sprint Plan"
        command: /sprint-plan
        required: true
        artifact:
          glob: "production/sprints/sprint-*.md"
          min_count: 1
        description: "Plan the first sprint with prioritized stories from epics"

      - id: beta-usability-test
        name: "Beta (usability tested)"
        command: /usability-test-report
        required: true
        artifact:
          glob: "production/usability-tests/*.md"
          min_count: 1
        description: "Document beta usability test sessions using /usability-test-report. Run at least once here (≥1 session required before Production; ≥3 required before Polish). Each session should cover one complete run-through of the primary workflow."

  production:
    label: "Production"
    description: "Sprint-based feature development — pick, implement, close stories"
    next_phase: polish
    steps:
      - id: sprint-plan
        name: "Sprint Plan"
        command: /sprint-plan
        required: true
        repeatable: true
        artifact:
          glob: "production/sprints/sprint-*.md"
        description: "Plan the current sprint with prioritized, ready stories"

      - id: story-readiness
        name: "Story Readiness Check"
        command: /story-readiness
        required: false
        description: "Validate a story is implementation-ready before a developer picks it up"

      - id: implement
        name: "Implement Stories"
        command: /dev-story
        required: true
        repeatable: true
        artifact:
          note: "Check src/ for active code and production/epics/**/*.md for In Progress stories"
        description: "Pick the next ready story and implement it with /dev-story [story-path]. Routes to the correct programmer agent."

      - id: code-review
        name: "Code Review"
        command: /code-review
        required: false
        repeatable: true
        description: "Architectural code review after each story implementation. Run after /dev-story, before /story-done."

      - id: story-done
        name: "Story Done Review"
        command: /story-done
        required: true
        repeatable: true
        description: "Verify all acceptance criteria, check PRD/ADR deviations, close the story"

      - id: qa-plan
        name: "QA Plan"
        command: /qa-plan
        required: false
        repeatable: true
        description: "Generate a QA test plan per epic or sprint. Run /qa-plan [epic-slug]. Produces test cases for /smoke-check, /regression-suite, and /test-evidence-review."

      - id: bug-report
        name: "Bug Report / Triage"
        command: /bug-report
        required: false
        repeatable: true
        description: "Log and prioritize bugs found during implementation. /bug-report creates a structured report; /bug-triage prioritizes the open backlog."

      - id: retrospective
        name: "Sprint Retrospective"
        command: /retrospective
        required: false
        repeatable: true
        description: "Post-sprint review to capture what worked and what to change. Run at the end of each sprint, before planning the next."

      - id: team-feature
        name: "Team Orchestration (optional)"
        required: false
        repeatable: true
        description: "Coordinate multiple agents on a complex feature. Use: /team-core-workflows, /team-content, /team-ui, /team-notifications, /team-information-architecture, /team-growth, /team-qa. Run when a feature spans multiple agent domains."

      - id: scope-check
        name: "Scope Check"
        command: /scope-check
        required: false
        repeatable: true
        artifact:
          glob: "production/sprints/sprint-*.md"
          note: "Run when stories are added mid-sprint, or before sprint retrospectives"
        description: "Detect scope creep by comparing current sprint scope to original epic scope. Run (a) when stories are added mid-sprint, or (b) before sprint retrospectives."

      - id: sprint-status
        name: "Sprint Status"
        command: /sprint-status
        required: false
        description: "Quick 30-line snapshot of sprint progress without a full report"

  polish:
    label: "Polish"
    description: "Performance, accessibility, usability testing, bug fixing"
    next_phase: release
    steps:
      - id: perf-profile
        name: "Performance Profile"
        command: /perf-profile
        required: false
        description: "Profile and optimize TTFB / LCP / INP / query budgets / bundle size"

      - id: tradeoff-check
        name: "Tradeoff Check"
        command: /tradeoff-check
        required: false
        description: "Analyze pricing tiers, entitlements, rate limits, and activation milestones for outliers and dominated options"

      - id: asset-audit
        name: "Asset Audit"
        command: /asset-audit
        required: false
        description: "Verify asset naming conventions, file format standards, and size / bundle budgets"

      - id: usability-test-polish
        name: "Usability Test Sessions (×3)"
        command: /usability-test-report
        required: true
        artifact:
          glob: "production/usability-tests/*.md"
          min_count: 3
        description: "Cover: new-user onboarding, primary daily workflow, edge / error recovery"

      - id: team-polish
        name: "Polish Team Pass"
        command: /team-polish
        required: true
        description: "Coordinated polish pass across performance, audio, visual, and UX"

  release:
    label: "Release"
    description: "Launch preparation, certification, and ship"
    next_phase: null
    steps:
      - id: release-checklist
        name: "Release Checklist"
        command: /release-checklist
        required: true
        description: "Pre-release validation across all departments: code, content, store, legal"

      - id: release-notes
        name: "Release Notes"
        command: /release-notes
        required: false
        description: "Generate user-facing release notes from git history and sprint data"

      - id: changelog
        name: "Changelog"
        command: /changelog
        required: false
        description: "Auto-generate internal changelog from commits, sprints, and design docs"

      - id: launch-checklist
        name: "Launch Checklist"
        command: /launch-checklist
        required: true
        description: "Final launch readiness — last gate before shipping to users"
